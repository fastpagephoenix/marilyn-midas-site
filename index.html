<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Age Verification | Marilyn Midas</title>
  <link rel="stylesheet" href="styles.css?v=20"/>
</head>

<body class="age-page">

  <main class="age-gate">
    <div class="age-box">
      <p class="eyebrow">Marilyn Midas Official</p>
      <h1 class="age-title">
  <span>Age</span>
  <span>Verification</span>
</h1>

      <p>
        This website is intended for adults 18 years of age or older.
        By entering, you confirm that you are at least 18.
      </p>

      <div class="age-buttons">
        <button onclick="enterSite()">I Am 18+</button>
        <button onclick="leaveSite()" class="secondary-btn">Exit</button>
      </div>
    </div>
  </main>

  <script>
    function enterSite() {
      localStorage.setItem("marilynMidasAgeVerified", "true");
      window.location.href = "home.html";
    }

    function leaveSite() {
      window.location.href = "https://www.google.com";
    }
  </script>

</body>
</html>
