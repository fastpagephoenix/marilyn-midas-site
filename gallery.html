<section class="full-gallery">

  <div class="gallery-masonry">
    <img src="hero-1.JPG" alt="Marilyn Midas gallery image">
    <img src="about.JPG" alt="Marilyn Midas gallery image">
    <img src="gallery-1.jpg" alt="Marilyn Midas gallery image">
    <img src="gallery-2.JPG" alt="Marilyn Midas gallery image 2">
    <img src="gallery-3.JPG" alt="Marilyn Midas gallery image 3">
    <img src="gallery-4.JPG" alt="Marilyn Midas gallery image 4">

    -->
  </div>

<section class="section center">
  <p class="eyebrow">Exclusive Access</p>

  <a href="home.html#connect" class="button">Connect</a>
</section>

<footer>
  <p>© 2026 Marilyn Midas. All rights reserved.</p>
</footer>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="Expanded gallery image">
</div>

<script>
  const galleryImages = document.querySelectorAll(".gallery-masonry img");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  galleryImages.forEach((img) => {
    img.addEventListener("click", () => {
      lightboxImg.src = img.src;
      lightbox.style.display = "flex";
    });
  });

  function closeLightbox() {
    lightbox.style.display = "none";
    lightboxImg.src = "";
  }
</script>
  
</body>
</html>
